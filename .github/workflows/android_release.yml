name: Build & Release Android

on:
  push:
    tags:
      - '*' # Trigger on ANY tag to be safe
    branches:
      - main # Also run on pushes to main (optional, builds APK but skips release step if you want)
  workflow_dispatch: # Allows manual trigger from the GitHub "Actions" tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
  # You may pin to the exact commit or the version.
  # uses: Swisyn/setup-android-sdk@e3e43cf6f87ec94a2c4970158fd2841712e78c66
        uses: Swisyn/setup-android-sdk@v1
        with:
    # cmdline-tools-version. See https://developer.android.com/studio#command-line-tools-only
          cmdline-tools-version: # optional, default is 11076708
    # Android SDK is usable only after the license agreement. Should setup-android agree to the licences, provided by "sdkmanager --licenses"
          accept-android-sdk-licenses: # optional, default is true
    # Should accepted licenses be logged. If not, accepted licences will be accepted silently
          log-accepted-android-sdk-licenses: # optional, default is true
    # Additional packages to install
          packages: # optional, default is tools platform-tools
          

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign Android Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
